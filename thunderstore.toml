[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "Altimeter"
description = "Client-side HUD that shows your altitude above ground in meters."
websiteUrl = "https://github.com/Little-Sparroh/Altimeter"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"
Sparroh-SparrohUILib = "1.1.1"


[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/Altimeter.dll"
target = "BepInEx/plugins/Altimeter.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
